<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Helper Tool</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">

    <!-- ══ ROW 1: Primary actions ══ -->
    <div class="navbar-row navbar-row--primary">

      <!-- Search -->
      <div class="navbar-section search-section">
        <input
          type="text"
          id="treeSearchInput"
          placeholder="Search folder/file..."
          class="search-input"
        />
        <ul id="searchSuggestions" class="search-suggestions"></ul>
      </div>

      <!-- Repo selection -->
      <div class="navbar-section">
        <button id="selectRepoBtn" class="primary-btn">
          <span class="btn-icon">📁</span>
          Select Repo
        </button>
        <button id="refreshBtn" class="tool-btn refresh-btn" title="Refresh folder tree">
          <span class="btn-icon refresh-icon">🔄</span>
          Refresh
        </button>
        <span id="activeRepoName" class="repo-name">No repo selected</span>
      </div>

      <!-- Mode + Generate -->
      <div class="navbar-section center">
        <button id="structureBtn" class="action-btn">
          <span class="btn-icon">🌳</span>
          Structure
        </button>
        <button id="codeBtn" class="action-btn">
          <span class="btn-icon">💻</span>
          Code
        </button>
        <button id="generateBtn" class="action-btn generate-btn">
          <span class="btn-icon">⚡</span>
          Generate
        </button>
      </div>

      <!-- Tools -->
      <div class="navbar-section right">
        <button id="clearSelectionBtn" class="tool-btn clear-btn" title="Clear All Selections">
          <span class="btn-icon">✕</span>
          Clear
        </button>
        <button id="editDocignoreBtn" class="tool-btn" title="Edit Global Ignore">
          <span class="btn-icon">⚙️</span>
          Ignore
        </button>
      </div>
    </div>

    <!-- ══ ROW 2: Status bar — always full width, always visible ══ -->
    <div class="status-bar">
      <div class="selection-counter">
        <span class="counter-icon">✓</span>
        <span id="selectionCount">0</span>
        <span class="counter-label">selected</span>
      </div>

      <div class="status-spacer"></div>

      <div class="progress-container">
        <span class="progress-label">Progress</span>
        <progress id="progressBar" value="0" max="100"></progress>
        <span id="progressText">0%</span>
      </div>
    </div>

    <!-- ══ Extension Filter Bar ══ -->
    <div class="filter-bar" id="filterContainer">
      <span class="filter-label">🔍 Filter:</span>
      <div class="filter-input-wrap">
        <input
          type="text"
          id="filterInput"
          placeholder="e.g. js, ts, html..."
          class="filter-text-input"
          autocomplete="off"
        />
        <ul id="extSuggestions" class="ext-suggestions"></ul>
      </div>
      <div id="activeFilters" class="active-filters"></div>

      <!-- ── NEW: Ignore toggle button ── -->
      <div class="filter-divider"></div>
      <button id="ignoreToggleBtn" class="tool-btn ignore-toggle-btn" title="Manage ignored extensions">
        <span class="btn-icon">🚫</span>
        Ext Ignore
        <span class="ignore-badge" style="display:none">0</span>
      </button>
    </div>

    <!-- ══ NEW: Ignore Panel (collapsible, below filter bar) ══ -->
    <div id="ignorePanel" class="ignore-panel">
      <div class="ignore-panel-inner">

        <!-- Left: Available extensions -->
        <div class="ignore-col">
          <div class="ignore-col-header">
            <span class="ignore-col-icon">📂</span>
            <span class="ignore-col-title">Detected Extensions</span>
            <span class="ignore-col-hint">Click to ignore →</span>
          </div>
          <div id="availableExts" class="ignore-chips-wrap"></div>
        </div>

        <!-- Divider arrow -->
        <div class="ignore-divider-vert">
          <span class="ignore-arrow">⟶</span>
        </div>

        <!-- Right: Ignored extensions -->
        <div class="ignore-col">
          <div class="ignore-col-header">
            <span class="ignore-col-icon">🚫</span>
            <span class="ignore-col-title">Ignored Extensions</span>
            <span class="ignore-col-hint">Hidden from tree</span>
          </div>
          <div id="ignoredExts" class="ignore-chips-wrap"></div>
        </div>

      </div>
    </div>

    <!-- ══ Tree view ══ -->
    <div class="tree-view-container">
      <div id="treeContainer">Select a repo to view files</div>
    </div>

  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
